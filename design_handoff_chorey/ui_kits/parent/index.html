<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sprout — Parent UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--cream-1); }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
      background: radial-gradient(ellipse at top, var(--cream-3), var(--cream-1) 60%);
    }
  </style>
</head>
<body>
  <div id="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../_shared/ios-frame.jsx"></script>
  <!-- Reuse Icon from KidComponents -->
  <script type="text/babel" src="../kid/components/KidComponents.jsx"></script>
  <script type="text/babel" src="components/ParentComponents.jsx"></script>
  <script type="text/babel" src="components/ParentKids.jsx"></script>
  <script type="text/babel" src="components/ParentChores.jsx"></script>
  <script type="text/babel" src="components/ParentSettings.jsx"></script>
  <script type="text/babel" src="components/ParentApp.jsx"></script>

  <script type="text/babel">
    function Stage() {
      return (
        <IOSDevice width={390} height={840}>
          <ParentApp />
        </IOSDevice>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('stage'));
    root.render(<Stage />);
  </script>
</body>
</html>
