<!--
  Chorey — "Reset password" email (Supabase → Authentication → Email Templates).

  ⚠️ NOT CURRENTLY USED. The app is passwordless (OTP + Apple/Google only), so
  Supabase never sends this. Kept branded and ready in case password login is
  ever added. Suggested subject: "Reset your Chorey password"

  Variables: {{ .ConfirmationURL }} reset link · {{ .Token }} 6-digit code.
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F6EFE3;margin:0;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#FFFCF6;border-radius:20px;border:1px solid #ECE3D1;overflow:hidden;">
      <tr>
        <td style="height:6px;background-color:#F3B58E;" width="40%"></td>
        <td style="height:6px;background-color:#C9B7E8;" width="40%"></td>
        <td style="height:6px;background-color:#A9CDB0;" width="20%"></td>
      </tr>
      <tr><td colspan="3" style="padding:36px 36px 8px 36px;" align="center">
        <img src="https://chorey.co/icon-512.png" width="60" height="60" alt="Chorey" style="display:block;margin:0 auto 14px;border-radius:16px;" />
        <div style="font-size:34px;font-weight:800;letter-spacing:-1px;color:#2A2018;">chorey</div>
      </td></tr>
      <tr><td colspan="3" style="padding:8px 36px 0 36px;" align="center">
        <h1 style="margin:0;font-size:22px;font-weight:800;color:#2A2018;">Reset your password</h1>
        <p style="margin:12px 0 0 0;font-size:15px;line-height:23px;color:#6B5E4E;">Enter this code in the app, or tap the button below.</p>
      </td></tr>
      <tr><td colspan="3" style="padding:24px 36px 8px 36px;" align="center">
        <div style="display:inline-block;background-color:#F6EFE3;border:1px solid #ECE3D1;border-radius:14px;padding:16px 28px;font-size:34px;font-weight:800;letter-spacing:8px;color:#2A2018;">{{ .Token }}</div>
      </td></tr>
      <tr><td colspan="3" style="padding:12px 36px 8px 36px;" align="center">
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#E8965E;color:#FFFFFF;text-decoration:none;font-size:16px;font-weight:700;padding:14px 32px;border-radius:999px;">Reset password</a>
      </td></tr>
      <tr><td colspan="3" style="padding:20px 36px 36px 36px;" align="center">
        <p style="margin:0;font-size:12px;line-height:18px;color:#9B8E7C;">If you didn't ask to reset your password, you can safely ignore this email — nothing will change.</p>
      </td></tr>
    </table>
    <p style="margin:18px 0 0 0;font-size:12px;color:#9B8E7C;">Chorey — chores that teach kids to spend, save &amp; give.</p>
  </td></tr>
</table>
